aid: national-archives-and-records-administration-nara-
name: National Archives and Records Administration (NARA)
description: >-
  The National Archives and Records Administration (NARA) is the nation's
  record keeper, preserving and providing access to federal government records
  that document the rights of American citizens and the actions of their
  government.
